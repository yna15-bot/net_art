<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raining Cats and Dogs</title>

<style>

body{
    margin:0;
    height:100vh;
    background:linear-gradient(#a6d8ff,#e6f7ff);
    overflow:hidden;
    font-size:40px;
}


.sky{
    width:100%;
    height:100%;
    position:relative;
}


.animal{
    position:absolute;
    top:-80px;
    opacity:0;
    transition:opacity 1s ease;

    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-play-state: paused;
}


.sky:hover .animal{
    opacity:1;
    animation-play-state: running;
}


@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

.animal:nth-child(1){
    left:10%;
    animation-duration:6s;
}

.animal:nth-child(2){
    left:25%;
    animation-duration:7s;
}

.animal:nth-child(3){
    left:40%;
    animation-duration:5s;
}

.animal:nth-child(4){
    left:55%;
    animation-duration:8s;
}

.animal:nth-child(5){
    left:70%;
    animation-duration:6s;
}

.animal:nth-child(6){
    left:85%;
    animation-duration:9s;
}

</style>
</head>

<body>

<div class="sky">
    <div class="animal">🐱</div>
    <div class="animal">🐶</div>
    <div class="animal">🐱</div>
    <div class="animal">🐶</div>
    <div class="animal">🐱</div>
    <div class="animal">🐶</div>
</div>

</body>
</html>
