<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<audio autoplay loop>
  <source src="audio/friends.mp3" type="audio/mpeg">
</audio>

<div class="background" style="background-image: url('images/friends.jpg');"></div>
<div class="overlay"></div>

<div class="container">
  <p class="text">
    everyone is laughing.<br>
    you’re not sure why, but you laugh too. <br>
    someone is telling a story you’ve already heard.<br>
everyone laughs anyway.<br><br>
your phone gets passed around for pictures<br>
you never see again.
  </p>

  <p id="extra" class="hidden text">
   you remember this being louder.<br>
or maybe just fuller.
  </p>

<button id="stayBtn" onclick="revealAndRemove('extra', 'stayBtn')">
  stay </button>
  <button onclick="freezeMoment()">stop time</button>
  <button onclick="goTo('car')">step away for a second</button>

</div>

<script src="script.js"></script>
</body>
</html>
